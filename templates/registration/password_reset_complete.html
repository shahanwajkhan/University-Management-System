{% extends 'base.html' %}
{% block title %}UMS - Password Changed Successfully{% endblock %}

{% block content %}
<div class="container my-5 py-5 custom-reset-page">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0 premium-card text-center">
                <div class="card-body p-4 p-md-5">
                    <div class="d-inline-flex justify-content-center align-items-center bg-success bg-opacity-10 text-success rounded-circle mb-4" style="width: 80px; height: 80px;">
                        <i class="bi bi-check-circle-fill border-0 fs-1"></i>
                    </div>
                    <h3 class="fw-bold text-dark mb-3">Password Changed!</h3>
                    
                    <p class="text-muted mb-4">
                        Your password has been set successfully. You may go ahead and log in now.
                    </p>
                    
                    <a href="{% url 'role_selection' %}" class="btn btn-primary w-100 py-3 rounded-pill fw-bold fs-5 shadow-sm">
                        <i class="bi bi-box-arrow-in-right me-2"></i> Log In Now
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .premium-card { border-radius: 16px; }
    .btn-primary {
        background-color: #ff5722;
        border-color: #ff5722;
    }
    .btn-primary:hover {
        background-color: #e64a19;
        border-color: #e64a19;
    }
</style>
{% endblock %}
